<body>
<div class="app">
  <header class="topbar"><div class="title"><h1>2026 하계수양회 접수</h1><span class="badge" id="churchBadge">광주봉선교회 · 17구역</span></div><button class="excel" id="exportExcelBtn">▣ 엑셀 출력</button></header>

  <main class="screen" id="screenForm"><section class="card"><div class="formtitle"><button class="back" id="backToListBtn">‹</button><h2 id="formHeading">새 참가자 등록</h2><button class="delete" id="deletePersonBtn">삭제</button></div><form id="personForm"><input id="editId" type="hidden"><div class="grid2"><div class="field"><label>구역 <i class="req">*</i></label><input id="zone" required placeholder="17구역"></div><div class="field"><label>이름 <i class="req">*</i></label><input id="name" required placeholder="이름을 입력하세요"></div></div><div class="grid2"><div class="field"><label>새신자 여부</label><div class="seg"><input name="isNew" id="newYes" value="예" type="radio"><label for="newYes">새신자</label><input name="isNew" id="newNo" value="아니오" type="radio" checked><label for="newNo">기존신자</label></div></div><div class="field"><label>관계</label><select id="relation"><option>본인</option><option>배우자</option><option>자녀</option><option>부모</option><option>인도자</option><option>친구</option><option>기타</option></select></div></div><div class="grid2"><div class="field"><label>참석 차수 <i class="req">*</i></label><select id="round"><option>1차</option><option>2차</option><option>3차</option><option>4차</option><option>5차</option><option>6차</option></select></div><div class="field"><label>대상 구분 <i class="req">*</i></label><select id="category" required><option value="">선택하세요</option><option>성인</option><option>청년</option><option>은빛장년</option><option>대학생</option><option>취학아동(초등)</option><option>미취학아동(5~7)</option><option>미취학아동(0~4)</option></select></div></div><div class="field"><label>성별 <i class="req">*</i></label><div class="seg"><input name="gender" id="genderM" value="남" type="radio" checked><label for="genderM">남</label><input name="gender" id="genderF" value="여" type="radio"><label for="genderF">여</label></div></div><div class="grid2 hidden" id="childInfo"><div class="field"><label id="gradeAgeLabel">학년/나이</label><input id="gradeAge"></div><div class="field"><label>보호자/동반자/인도자</label><input id="guardian"></div></div><div class="field" id="adultInfo"><label>보호자/동반자/인도자</label><input id="guardianAdult" placeholder="필요 시 입력"></div><div class="grid2"><div class="field"><label>연락처</label><input id="phone" type="tel" placeholder="010-0000-0000"></div><div class="field"><label>봉사 부서</label><select id="serviceDept"><option value="">선택 안함</option><option>찬양팀</option><option>유치부</option><option>초등부</option><option>중고등부</option><option>식당봉사</option><option>차량봉사</option><option>방송/음향</option><option>기타</option></select></div></div><div class="line"></div><div class="grid2"><div class="field"><label>차량 접수</label><div class="seg"><input name="vehicle" id="vehicleYes" value="예" type="radio"><label for="vehicleYes">신청</label><input name="vehicle" id="vehicleNo" value="아니오" type="radio" checked><label for="vehicleNo">미신청</label></div></div><div class="field" id="vehicleCountWrap"><label>차량 대수/인원</label><div class="counter"><button type="button" id="minusVehicle">−</button><input id="vehicleCount" type="number" min="0" value="0"><button type="button" id="plusVehicle">＋</button></div></div></div><div class="field"><label>숙소 신청</label><div class="seg three"><input name="lodging" id="lodgingNone" value="신청 안함" type="radio" checked><label for="lodgingNone">안함</label><input name="lodging" id="lodgingBaby" value="12개월 이하" type="radio"><label for="lodgingBaby">12개월 이하</label><input name="lodging" id="lodgingToddler" value="2~4세" type="radio"><label for="lodgingToddler">2~4세</label></div></div><div class="line"></div><div class="grid2"><div class="field"><label>수령액</label><input id="paidAmount" type="number" min="0" value="0"></div><div class="field"><label>납부 상태</label><div class="seg three"><input name="payMode" id="payNone" value="미납" type="radio" checked><label for="payNone">미납</label><input name="payMode" id="payFull" value="완납" type="radio"><label for="payFull">완납</label><input name="payMode" id="payPart" value="부분" type="radio"><label for="payPart">부분</label></div></div></div><div class="calc"><div><small>회비</small><b id="baseFeeText">0원</b></div><b class="op">＋</b><div><small>차량금액</small><b id="vehicleFeeText">0원</b></div><b class="op">＝</b><div><small>총액 / 미납</small><b><em class="total" id="totalFeeText">0원</em> / <em class="red" id="unpaidText">0원</em></b></div></div><div class="field"><label>메모</label><textarea id="memo" placeholder="기타 메모를 입력하세요"></textarea></div><div class="actions"><button class="ghost" id="resetFormBtn" type="button">초기화</button><button class="save" type="submit">저장</button></div></form></section></main>
  <main class="screen" id="screenSummary"><section class="card summary"><h3>정산 요약</h3><table><tbody id="moneySummaryBody"></tbody></table></section><section class="card summary"><h3>항목별 인원/금액</h3><table><thead><tr><th>구분</th><th>인원</th><th>금액</th></tr></thead><tbody id="categorySummaryBody"></tbody></table></section><button class="primary" id="exportExcelBtn2">▣ 기존 양식대로 엑셀 출력</button></main>
  <main class="screen" id="screenSettings"><section class="card summary"><h3>기본 설정</h3><div class="grid2"><div class="field"><label>교회명</label><input id="setChurch"></div><div class="field"><label>기본 구역</label><input id="setZone"></div></div><div class="grid2"><div class="field"><label>기본 차수</label><select id="setRound"><option>1차</option><option>2차</option><option>3차</option><option>4차</option><option>5차</option><option>6차</option></select></div><div class="field"><label>차량 단가</label><input id="setVehicleFee" type="number" min="0"></div></div><button class="save" id="saveSettingsBtn" type="button">설정 저장</button></section><section class="card"><h3>데이터 관리</h3><p class="note">데이터는 이 휴대폰 브라우저에 자동 저장됩니다. 다른 휴대폰과 동기화하려면 나중에 Firestore 연결을 붙이면 됩니다.</p><button class="ghost" id="sampleBtn" type="button" style="width:100%;margin-top:10px">샘플 데이터 넣기</button><button class="danger" id="clearAllBtn" type="button" style="width:100%;margin-top:10px">전체 데이터 삭제</button></section></main>
</div>
<nav class="bottom"><button class="nav active" data-screen="list"><span>👥</span>명단</button><button class="nav" data-screen="form"><span>＋</span>접수</button><button class="nav" data-screen="summary"><span>₩</span>정산</button><button class="nav" data-screen="settings"><span>⚙</span>설정</button></nav><div class="toast" id="toast"></div><div class="modal" id="confirmModal"><div class="sheet"><h3 id="modalTitle">확인</h3><p id="modalText">진행할까요?</p><div class="actions"><button class="ghost" id="modalCancel">취소</button><button class="danger" id="modalOk">확인</button></div></div></div>
<script>
'use strict';
const STORAGE_KEY='retreatRegistration2026.v1',SETTINGS_KEY='retreatRegistration2026.settings.v1';
const FEE={'성인':70000,'청년':70000,'은빛장년':50000,'대학생':40000,'취학아동(초등)':40000,'미취학아동(5~7)':30000,'미취학아동(0~4)':0},ORDER=Object.keys(FEE);
let people=[],settings={church:'광주봉선교회',zone:'17구역',defaultRound:'6차',vehicleUnitFee:20000},pending=null;
const $=id=>document.getElementById(id),won=n=>(Number(n)||0).toLocaleString('ko-KR')+'원',num=v=>Number(String(v||0).replace(/[^0-9]/g,''))||0,uid=()=>`p_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,8)}`;
const esc=v=>String(v??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));
function load(){try{people=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}catch{people=[]}try{settings={...settings,...JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}')}}catch{}}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(people))}function saveSettings(){localStorage.setItem(SETTINGS_KEY,JSON.stringify(settings))}
function toast(s){$('toast').textContent=s;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1700)}
function screen(name){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));$(`screen${name[0].toUpperCase()+name.slice(1)}`).classList.add('active');document.querySelectorAll('.nav').forEach(x=>x.classList.toggle('active',x.dataset.screen===name));if(name==='summary')renderSummary();if(name==='settings')fillSettings();scrollTo({top:0,behavior:'smooth'})}
function radio(name){return document.querySelector(`input[name="${name}"]:checked`)?.value||''}function setRadio(name,value){document.querySelectorAll(`input[name="${name}"]`).forEach(x=>x.checked=x.value===value)}function child(c){return c==='취학아동(초등)'||c.startsWith('미취학아동')}
function calc(){const c=$('category').value,base=FEE[c]||0,on=radio('vehicle')==='예',vc=on?num($('vehicleCount').value):0,vf=on?vc*num(settings.vehicleUnitFee):0,total=base+vf,mode=radio('payMode');$('vehicleCount').value=vc;if(mode==='완납')$('paidAmount').value=total;if(mode==='미납')$('paidAmount').value=0;const paid=Math.min(num($('paidAmount').value),total),unpaid=Math.max(total-paid,0);$('baseFeeText').textContent=won(base);$('vehicleFeeText').textContent=won(vf);$('totalFeeText').textContent=won(total);$('unpaidText').textContent=won(unpaid);$('vehicleCountWrap').classList.toggle('hidden',!on);$('childInfo').classList.toggle('hidden',!child(c));$('adultInfo').classList.toggle('hidden',child(c));$('gradeAgeLabel').textContent=c==='취학아동(초등)'?'학년':'나이';$('gradeAge').placeholder=c==='취학아동(초등)'?'예: 초1, 초2':'예: 3세, 6세';return{base,vf,total,paid,unpaid,vc}}
function formData(){const a=calc(),category=$('category').value;return{id:$('editId').value||uid(),zone:$('zone').value.trim()||settings.zone,name:$('name').value.trim(),isNew:radio('isNew'),relation:$('relation').value,round:$('round').value,category,gender:radio('gender'),gradeAge:$('gradeAge').value.trim(),guardian:(child(category)?$('guardian'):$('guardianAdult')).value.trim(),phone:$('phone').value.trim(),serviceDept:$('serviceDept').value,vehicle:radio('vehicle'),vehicleCount:a.vc,lodging:radio('lodging'),baseFee:a.base,vehicleFee:a.vf,totalFee:a.total,paidAmount:a.paid,unpaidAmount:a.unpaid,memo:$('memo').value.trim(),updatedAt:new Date().toISOString(),createdAt:$('editId').value?people.find(x=>x.id===$('editId').value)?.createdAt||new Date().toISOString():new Date().toISOString()}}
function reset(){ $('personForm').reset();$('editId').value='';$('zone').value=settings.zone;$('round').value=settings.defaultRound;$('vehicleCount').value=0;$('paidAmount').value=0;$('formHeading').textContent='새 참가자 등록';$('deletePersonBtn').style.display='none';setRadio('isNew','아니오');setRadio('gender','남');setRadio('vehicle','아니오');setRadio('lodging','신청 안함');setRadio('payMode','미납');calc() }
function fill(p){$('editId').value=p.id;$('zone').value=p.zone;$('name').value=p.name;$('relation').value=p.relation||'본인';$('round').value=p.round||settings.defaultRound;$('category').value=p.category;$('gradeAge').value=p.gradeAge||'';$('guardian').value=p.guardian||'';$('guardianAdult').value=p.guardian||'';$('phone').value=p.phone||'';$('serviceDept').value=p.serviceDept||'';$('vehicleCount').value=p.vehicleCount||0;$('paidAmount').value=p.paidAmount||0;$('memo').value=p.memo||'';setRadio('isNew',p.isNew||'아니오');setRadio('gender',p.gender||'남');setRadio('vehicle',p.vehicle||'아니오');setRadio('lodging',p.lodging||'신청 안함');setRadio('payMode',p.unpaidAmount===0&&p.totalFee>0?'완납':p.paidAmount?'부분':'미납');$('formHeading').textContent='참가자 수정';$('deletePersonBtn').style.display='block';calc();screen('form')}
function totals(list=people){return list.reduce((a,p)=>{a.count++;a.total+=p.totalFee||0;a.base+=p.baseFee||0;a.vehicle+=p.vehicleFee||0;a.paid+=p.paidAmount||0;a.unpaid+=p.unpaidAmount||0;return a},{count:0,total:0,base:0,vehicle:0,paid:0,unpaid:0})}
function avatar(p){return p.gender==='여'?'f':child(p.category)?'c':p.category==='은빛장년'?'s':''}function tags(p){return`${p.vehicle==='예'?'<span class="tag">차량</span>':''}${p.lodging&&p.lodging!=='신청 안함'?'<span class="tag green">숙소</span>':''}${p.isNew==='예'?'<span class="tag yellow">새신자</span>':''}`}
function renderList(){ $('churchBadge').textContent=`${settings.church} · ${settings.zone}`;const q=$('searchInput').value.trim().toLowerCase(),f=$('filterCategory').value,list=people.filter(p=>(!q||`${p.name} ${p.phone} ${p.guardian} ${p.zone}`.toLowerCase().includes(q))&&(f==='all'||f==='unpaid'&&p.unpaidAmount>0||p.category===f)),s=totals();$('statCount').textContent=`${s.count}명`;$('statTotal').textContent=won(s.total);$('statUnpaid').textContent=won(s.unpaid);$('listCount').textContent=`${list.length}명`;$('personList').innerHTML=list.length?list.map(p=>`<article class="person" data-id="${p.id}"><div class="avatar ${avatar(p)}">${esc(p.name.slice(0,1))}</div><div><div class="pname">${esc(p.name)}</div><div class="psub">${esc(p.category)} · ${esc(p.gradeAge||p.relation||'-')} · ${esc(p.gender)} · ${esc(p.round)}</div><div class="tags">${tags(p)}</div></div><div class="amount"><b>${won(p.totalFee)}</b><small class="${p.unpaidAmount===0?'done':'red'}">${p.unpaidAmount===0?'납부완료':'미납 '+won(p.unpaidAmount)}</small></div><div class="chev">›</div></article>`).join(''):'<div class="empty">아직 등록된 참가자가 없어.<br>위의 파란 버튼으로 한 명씩 등록하면 돼.</div>';document.querySelectorAll('.person').forEach(x=>x.onclick=()=>fill(people.find(p=>p.id===x.dataset.id))) }
function categories(){return ORDER.map(cat=>{const a=people.filter(p=>p.category===cat);return{cat,count:a.length,total:a.reduce((s,p)=>s+(p.baseFee||0),0)}})}function renderSummary(){const s=totals();$('moneySummaryBody').innerHTML=`<tr><th>전체 인원</th><td>${s.count}명</td></tr><tr><th>수양회비 총 합계액</th><td>${won(s.base)}</td></tr><tr><th>차량합계액</th><td>${won(s.vehicle)}</td></tr><tr><th>전체 총액</th><td>${won(s.total)}</td></tr><tr><th>총수령액</th><td>${won(s.paid)}</td></tr><tr><th>미납금액</th><td class="red">${won(s.unpaid)}</td></tr>`;$('categorySummaryBody').innerHTML=categories().map(x=>`<tr><td>${x.cat}</td><td>${x.count}명</td><td>${won(x.total)}</td></tr>`).join('')}
function exportExcel(){if(!people.length)return toast('출력할 참가자가 없어');const head=['번호','구역','이름','새신자','관계','참석차수','성별 남','성별 여','성인(70,000)','청년(70,000)','은빛장년(50,000)','대학생(40,000)','취학아동(초등)(40,000)','학년','미취학아동(5~7)(30,000)','나이','미취학아동(0~4)(무료)','나이','보호자/동반자/인도자','연락처','봉사부서','차량접수','차량 대수','차량금액','숙소 신청 안함','12개월 이하','2~4세','총회비','총수령액','미납금액','메모'];const rows=[[`2026 하계수양회 ${settings.church} 사전접수`],[`구역: ${settings.zone}`,`출력일: ${new Date().toLocaleDateString('ko-KR')}`],[],head];people.forEach((p,i)=>rows.push([i+1,p.zone,p.name,p.isNew,p.relation,p.round,p.gender==='남'?'○':'',p.gender==='여'?'○':'',p.category==='성인'?'○':'',p.category==='청년'?'○':'',p.category==='은빛장년'?'○':'',p.category==='대학생'?'○':'',p.category==='취학아동(초등)'?'○':'',p.category==='취학아동(초등)'?p.gradeAge:'',p.category==='미취학아동(5~7)'?'○':'',p.category==='미취학아동(5~7)'?p.gradeAge:'',p.category==='미취학아동(0~4)'?'○':'',p.category==='미취학아동(0~4)'?p.gradeAge:'',p.guardian,p.phone,p.serviceDept,p.vehicle,p.vehicleCount,p.vehicleFee,p.lodging==='신청 안함'?'○':'',p.lodging==='12개월 이하'?'○':'',p.lodging==='2~4세'?'○':'',p.totalFee,p.paidAmount,p.unpaidAmount,p.memo]));const c=categories(),s=totals();rows.push([],['항목별 인원(명)','','','','','','','',...ORDER.map(cat=>c.find(x=>x.cat===cat).count)],['항목별 총액(원)','','','','','','','',...ORDER.map(cat=>c.find(x=>x.cat===cat).total)],[],['전체 인원(명)',s.count,'전체 총액(원)',s.total],['수양회비 총 합계액',s.base],['차량합계액',s.vehicle],['총수령액',s.paid],['미납금액',s.unpaid]);if(window.XLSX){const wb=XLSX.utils.book_new(),ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=head.map((_,i)=>({wch:i<6?10:12}));ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:8}}];XLSX.utils.book_append_sheet(wb,ws,'사전접수');XLSX.writeFile(wb,`2026_하계수양회_${settings.zone}_사전접수.xlsx`);toast('엑셀 파일을 만들었어')}else{const blob=new Blob(['\ufeff'+rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n')],{type:'text/csv;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`2026_하계수양회_${settings.zone}_사전접수.csv`;a.click();URL.revokeObjectURL(a.href);toast('CSV 파일로 출력했어')}}
function fillSettings(){$('setChurch').value=settings.church;$('setZone').value=settings.zone;$('setRound').value=settings.defaultRound;$('setVehicleFee').value=settings.vehicleUnitFee}function confirm(title,text,fn){$('modalTitle').textContent=title;$('modalText').textContent=text;pending=fn;$('confirmModal').classList.add('show')}function close(){pending=null;$('confirmModal').classList.remove('show')}
function samples(){[{name:'강지승',category:'성인',gender:'남',relation:'본인',paidAmount:90000,vehicle:'예',vehicleCount:1,lodging:'신청 안함'},{name:'이가영',category:'성인',gender:'여',relation:'배우자',paidAmount:70000,vehicle:'아니오',vehicleCount:0,lodging:'2~4세'},{name:'강은우',category:'취학아동(초등)',gender:'남',relation:'자녀',gradeAge:'초1',guardian:'강지승',paidAmount:0,vehicle:'예',vehicleCount:1,lodging:'신청 안함'},{name:'강선우',category:'미취학아동(5~7)',gender:'남',relation:'자녀',gradeAge:'4세',guardian:'강지승',paidAmount:0,vehicle:'아니오',vehicleCount:0,lodging:'2~4세'}].forEach(x=>{const base=FEE[x.category],vf=x.vehicle==='예'?x.vehicleCount*settings.vehicleUnitFee:0,total=base+vf;people.push({id:uid(),zone:settings.zone,isNew:'아니오',round:settings.defaultRound,phone:'',serviceDept:'',memo:'',guardian:'',...x,baseFee:base,vehicleFee:vf,totalFee:total,unpaidAmount:Math.max(total-x.paidAmount,0),createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()})});save();renderList();renderSummary();toast('샘플 데이터를 넣었어')}
function bind(){$('exportExcelBtn').onclick=exportExcel;$('exportExcelBtn2').onclick=exportExcel;$('newPersonBtn').onclick=()=>{reset();screen('form')};$('backToListBtn').onclick=()=>screen('list');document.querySelectorAll('.nav').forEach(b=>b.onclick=()=>{if(b.dataset.screen==='form')reset();screen(b.dataset.screen)});['category','vehicleCount','paidAmount'].forEach(id=>$(id).oninput=calc);document.querySelectorAll('input[name="vehicle"],input[name="payMode"]').forEach(x=>x.onchange=calc);$('minusVehicle').onclick=()=>{$('vehicleCount').value=Math.max(0,num($('vehicleCount').value)-1);calc()};$('plusVehicle').onclick=()=>{$('vehicleCount').value=num($('vehicleCount').value)+1;setRadio('vehicle','예');calc()};$('personForm').onsubmit=e=>{e.preventDefault();const p=formData();if(!p.name)return toast('이름을 입력해줘');if(!p.category)return toast('대상 구분을 선택해줘');if(child(p.category)&&!p.gradeAge)return toast(p.category==='취학아동(초등)'?'학년을 입력해줘':'나이를 입력해줘');if(p.paidAmount>p.totalFee)return toast('수령액이 총액보다 클 수 없어');const i=people.findIndex(x=>x.id===p.id);if(i<0){people.push(p);toast('저장 완료')}else{people[i]=p;toast('수정 완료')}save();renderList();renderSummary();reset();screen('list')};$('resetFormBtn').onclick=reset;$('deletePersonBtn').onclick=()=>{const p=people.find(x=>x.id===$('editId').value);if(p)confirm('참가자 삭제',`${p.name} 님을 삭제할까?`,()=>{people=people.filter(x=>x.id!==p.id);save();renderList();reset();screen('list');close();toast('삭제했어')})};$('searchInput').oninput=renderList;$('filterCategory').onchange=renderList;$('saveSettingsBtn').onclick=()=>{settings.church=$('setChurch').value.trim()||'광주봉선교회';settings.zone=$('setZone').value.trim()||'17구역';settings.defaultRound=$('setRound').value;settings.vehicleUnitFee=num($('setVehicleFee').value);saveSettings();reset();renderList();toast('설정을 저장했어')};$('sampleBtn').onclick=samples;$('clearAllBtn').onclick=()=>confirm('전체 삭제','등록된 모든 참가자 데이터를 삭제할까? 이 작업은 되돌릴 수 없어.',()=>{people=[];save();renderList();renderSummary();close();toast('전체 삭제 완료')});$('modalCancel').onclick=close;$('modalOk').onclick=()=>pending?.();$('confirmModal').onclick=e=>{if(e.target===$('confirmModal'))close()}}
document.addEventListener('DOMContentLoaded',()=>{load();bind();reset();renderList();renderSummary()});
</script>
