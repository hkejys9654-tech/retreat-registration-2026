      const blob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
      const link=document.createElement('link');

      document.head.appendChild(link);

  <style>

-muted);font-style:normal}.search input,.tools select{width:100%;height:42px;padding:0 10px;border:1px solid var(--line);border-radius:13px;background:#fff;font-size:14px}.search input{padding-left:36px}.tools select{width:84px;font-weight:700}.list{display:grid;gap:8px}.person{display:grid;grid-template-columns:42px 1fr auto 18px;align-items:center;gap:10px;padding:10px;border-radius:16px;cursor:pointer}.avatar{display:grid;place-items:center;width:42px;height:42px;border-radius:50%;background:#eaf3ff;color:var(--blue);font-size:18px;font-weight:900}.avatar.f{background:#fff1f2;color:#ef4444}.avatar.c{background:#f0fdf4;color:#16a34a}.avatar.s{background:#faf5ff;color:#7c3aed}.pname{font-size:17px;font-weight:900}.psub{overflow:hidden;color:var(--muted);font-size:12px;font-weight:700;text-overflow:ellipsis;white-space:nowrap;margin-top:3px}.tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}.tag{padding:3px 7px;background:#eaf3ff;color:var(--blue);font-size:11px}.tag.green{background:#ecfdf5;color:#059669}.tag.yellow{background:#fffbeb;color:#d97706}.amount{text-align:right;white-space:nowrap}.amount b{display:block;font-size:15px}.amount small{font-size:11px;font-weight:900}.done{color:var(--blue)}.chev{font-size:24px;color:#94a3b8}.empty{padding:30px 16px;border:1px dashed #cbd5e1;border-radius:18px;background:#fff;text-align:center;color:var(--muted);font-weight:700}.screen{display:none}.screen.active{display:block}.card{border-radius:20px;padding:16px}.formtitle{display:grid;grid-template-columns:38px 1fr auto;align-items:center;margin-bottom:12px;text-align:center}.formtitle h2{margin:0;font-size:19px}.back,.delete{border-radius:12px;font-weight:900}.back{width:38px;height:38px;background:#f1f5f9;font-size:23px}.delete{display:none;padding:8px 10px;color:#dc2626;background:#fff1f2;font-size:12px}.field{margin-bottom:12px}.field label{display:block;margin-bottom:7px;color:#1f2937;font-size:13px;font-weight:900}.req{color:var(--red)}.field input,.field select,.field textarea{width:100%;min-height:44px;padding:0 12px;border:1px solid #dbe3ef;border-radius:12px;background:#fff;outline:none;font-size:15px}.field textarea{min-height:72px;padding-top:10px;resize:none}.field input:focus,.field select:focus,.field textarea:focus{border-color:#75a9ff;box-shadow:0 0 0 3px #1769e91a}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.seg{display:grid;grid-template-columns:repeat(2,1fr);overflow:hidden;border:1px solid #dbe3ef;border-radius:12px;background:#f8fafc}.seg.three{grid-template-columns:repeat(3,1fr)}.seg input{display:none}.seg label{display:grid;place-items:center;height:42px;margin:0;border-right:1px solid #dbe3ef;color:#475569;font-weight:900;font-size:14px;text-align:center}.seg label:last-child{border:0}.seg input:checked+label{background:#eaf3ff;color:var(--blue);box-shadow:inset 0 0 0 1px var(--blue)}.line{height:1px;margin:14px 0;background:var(--line)}.hidden{display:none!important}.counter{display:grid;grid-template-columns:1fr 1fr 1fr;border:1px solid #dbe3ef;border-radius:12px;overflow:hidden}.counter button,.counter input{height:42px;border:0;border-radius:0;text-align:center}.counter button{background:#f8fafc;font-size:17px;font-weight:900}.calc{display:grid;grid-template-columns:1fr auto 1fr auto 1.4fr;gap:5px;align-items:center;margin:14px 0;padding:12px;border:1px solid #bfd7ff;border-radius:16px;background:#f8fbff;text-align:center}.calc small{display:block;color:var(--muted);font-size:12px;font-weight:900}.calc b{font-size:14px}.calc .op{color:var(--muted)}.calc .total{color:var(--blue)}.actions{display:grid;grid-template-columns:1fr 1.4fr;gap:10px}.ghost{height:50px;border:1px solid #dbe3ef;border-radius:14px;background:#f8fafc;color:#334155;font-weight:900}.save{height:50px;border:0;font-size:17px}.summary{margin-bottom:12px}.summary h3{margin:0 0 12px;font-size:16px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:9px 5px;border-bottom:1px solid #edf2f7;text-align:right}th:first-child,td:first-child{text-align:left}th{color:var(--muted)}td{font-weight:800}.bottom{position:fixed;z-index:10;bottom:0;left:50%;transform:translateX(-50%);display:grid;grid-template-columns:repeat(4,1fr);width:100%;max-width:520px;height:76px;padding:8px 10px 10px;border-top:1px solid var(--line);background:#fffffff2;backdrop-filter:blur(18px)}.nav{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border-radius:16px;background:transparent;color:var(--muted);font-size:12px;font-weight:900}.nav span{font-size:20px}.nav.active{color:var(--blue);background:#eaf3ff}.toast{position:fixed;z-index:20;bottom:88px;left:50%;transform:translate(-50%,20px);padding:11px 14px;border-radius:999px;background:#0f172a;color:white;font-size:13px;font-weight:800;opacity:0;transition:.22s}.toast.show{opacity:1;transform:translate(-50%,0)}.modal{position:fixed;z-index:30;inset:0;display:none;align-items:flex-end;background:#0f172a6b}.modal.show{display:flex}.sheet{width:100%;max-width:520px;padding:18px 16px 24px;border-radius:24px 24px 0 0;background:#fff}.sheet h3{margin:0 0 10px}.sheet p{color:var(--muted);font-weight:700;line-height:1.5}.sheet .actions{grid-template-columns:1fr 1fr}.danger{height:48px;border-radius:14px;background:var(--red);color:#fff;font-weight:900}.note{padding:12px;border-radius:14px;background:#f1f5f9;color:#475569;font-size:12px;font-weight:700;line-height:1.5}@media(max-width:390px){.app{padding-inline:12px}.title h1{font-size:22px}.stat{padding-inline:8px}.stat b{font-size:18px}.grid2{grid-template-columns:1fr}.calc{grid-template-columns:1fr;gap:8px}.calc .op{display:none}}
  </style>

<body>
<div class="app">
  <header class="topbar">
    <div class="title"><h1>2026 하계수양회 접수</h1><span class="badge" id="churchBadge">광주봉선교회 · 17구역</span></div>
    <button class="excel" id="exportExcelBtn">▣ 엑셀 출력</button>
  </header>

  <main class="screen active" id="screenList">
    <section class="stats">
      <div class="stat"><span>👥</span><small>총 인원</small><b id="statCount">0명</b></div>
      <div class="stat"><span>₩</span><small>총 금액</small><b id="statTotal">0원</b></div>
      <div class="stat"><span>!</span><small>미납</small><b class="red" id="statUnpaid">0원</b></div>
    </section>
    <button class="primary" id="newPersonBtn">＋ 새 참가자 등록</button>
    <div class="head"><h2>참가자 목록</h2><span class="pill" id="listCount">0명</span></div>
    <div class="tools">
      <div class="search"><i>⌕</i><input id="searchInput" type="search" placeholder="이름, 연락처, 보호자 검색"></div>
      <select id="filterCategory">
        <option value="all">전체</option><option value="성인">성인</option><option value="청년">청년</option><option value="은빛장년">은빛</option><option value="대학생">대학생</option><option value="취학아동(초등)">초등</option><option value="미취학아동(5~7)">5~7세</option><option value="unpaid">미납</option>
      </select>
    </div>
    <div class="list" id="personList"></div>
  </main>

  <main class="screen" id="screenForm">
    <section class="card">
      <div class="formtitle"><button class="back" id="backToListBtn">‹</button><h2 id="formHeading">새 참가자 등록</h2><button class="delete" id="deletePersonBtn">삭제</button></div>
      <form id="personForm">
        <input id="editId" type="hidden">
        <div class="grid2"><div class="field"><label>구역 <i class="req">*</i></label><input id="zone" required placeholder="17구역"></div><div class="field"><label>이름 <i class="req">*</i></label><input id="name" required placeholder="이름을 입력하세요"></div></div>
        <div class="grid2"><div class="field"><label>새신자 여부</label><div class="seg"><input name="isNew" id="newYes" value="예" type="radio"><label for="newYes">새신자</label><input name="isNew" id="newNo" value="아니오" type="radio" checked><label for="newNo">기존신자</label></div></div><div class="field"><label>관계</label><select id="relation"><option>본인</option><option>배우자</option><option>자녀</option><option>부모</option><option>인도자</option><option>친구</option><option>기타</option></select></div></div>
        <div class="grid2"><div class="field"><label>참석 차수 <i class="req">*</i></label><select id="round"><option>1차</option><option>2차</option><option>3차</option><option>4차</option><option>5차</option><option>6차</option></select></div><div class="field"><label>대상 구분 <i class="req">*</i></label><select id="category" required><option value="">선택하세요</option><option>성인</option><option>청년</option><option>은빛장년</option><option>대학생</option><option>취학아동(초등)</option><option>미취학아동(5~7)</option></select></div></div>
        <div class="field"><label>성별 <i class="req">*</i></label><div class="seg"><input name="gender" id="genderM" value="남" type="radio" checked><label for="genderM">남</label><input name="gender" id="genderF" value="여" type="radio"><label for="genderF">여</label></div></div>
        <div class="grid2 hidden" id="childInfo"><div class="field"><label id="gradeAgeLabel">학년/나이</label><input id="gradeAge"></div><div class="field"><label>보호자/동반자/인도자</label><input id="guardian"></div></div>
        <div class="field" id="adultInfo"><label>보호자/동반자/인도자</label><input id="guardianAdult" placeholder="필요 시 입력"></div>
        <div class="grid2">
          <div class="field"><label>연락처</label><input id="phone" type="tel" placeholder="010-0000-0000"></div>
          <div class="field"><label>봉사 부서</label><select id="serviceDept"><option value="">선택 안함</option><option>찬양대</option><option>유치부</option><option>초등부</option><option>중고등부</option><option>식당봉사</option><option>차량봉사</option><option>방송/음향</option><option>직접입력</option></select></div>
        </div>
        <div class="field hidden" id="serviceDeptCustomWrap"><label>봉사 부서 직접입력</label><input id="serviceDeptCustom" placeholder="예: 의료, 안내, 접수 등"></div>
        <div class="line"></div>
        <div class="grid2"><div class="field"><label>차량 접수</label><div class="seg"><input name="vehicle" id="vehicleYes" value="예" type="radio"><label for="vehicleYes">신청</label><input name="vehicle" id="vehicleNo" value="아니오" type="radio" checked><label for="vehicleNo">미신청</label></div></div><div class="field" id="vehicleCountWrap"><label>차량 인원</label><div class="counter"><button type="button" id="minusVehicle">−</button><input id="vehicleCount" type="number" min="0" value="0"><button type="button" id="plusVehicle">＋</button></div></div></div>
        <div class="field"><label>숙소 신청</label><div class="seg three"><input name="lodging" id="lodgingNormal" value="총회제공" type="radio" checked><label for="lodgingNormal">총회제공</label><input name="lodging" id="lodgingBaby" value="12개월 이하" type="radio"><label for="lodgingBaby">12개월 이하</label><input name="lodging" id="lodgingToddler" value="2~4세" type="radio"><label for="lodgingToddler">2~4세</label></div></div>
        <div class="line"></div>
        <div class="grid2"><div class="field"><label>수령액</label><input id="paidAmount" type="number" min="0" value="0"></div><div class="field"><label>납부 상태</label><div class="seg three"><input name="payMode" id="payNone" value="미납" type="radio" checked><label for="payNone">미납</label><input name="payMode" id="payFull" value="완납" type="radio"><label for="payFull">완납</label><input name="payMode" id="payPart" value="부분" type="radio"><label for="payPart">부분</label></div></div></div>
        <div class="calc"><div><small>회비</small><b id="baseFeeText">0원</b></div><b class="op">＋</b><div><small>차량금액</small><b id="vehicleFeeText">0원</b></div><b class="op">＝</b><div><small>총액 / 미납</small><b><em class="total" id="totalFeeText">0원</em> / <em class="red" id="unpaidText">0원</em></b></div></div>
        <div class="field"><label>메모</label><textarea id="memo" placeholder="기타 메모를 입력하세요"></textarea></div>
        <div class="actions"><button class="ghost" id="resetFormBtn" type="button">초기화</button><button class="save" type="submit">저장</button></div>
      </form>
    </section>
  </main>

  <main class="screen" id="screenSummary">
    <section class="card summary"><h3>정산 요약</h3><table><tbody id="moneySummaryBody"></tbody></table></section>
    <section class="card summary"><h3>항목별 인원/금액</h3><table><thead><tr><th>구분</th><th>인원</th><th>금액</th></tr></thead><tbody id="categorySummaryBody"></tbody></table></section>
    <button class="primary" id="exportExcelBtn2">▣ 기존 양식대로 엑셀 출력</button>
  </main>

  <main class="screen" id="screenSettings">
    <section class="card summary"><h3>기본 설정</h3><div class="grid2"><div class="field"><label>교회명</label><input id="setChurch"></div><div class="field"><label>기본 구역</label><input id="setZone"></div></div><div class="grid2"><div class="field"><label>기본 차수</label><select id="setRound"><option>1차</option><option>2차</option><option>3차</option><option>4차</option><option>5차</option><option>6차</option></select></div><div class="field"><label>차량 단가</label><input id="setVehicleFee" type="number" min="0"></div></div><button class="save" id="saveSettingsBtn" type="button">설정 저장</button></section>
    <section class="card"><h3>데이터 관리</h3><p class="note">데이터는 이 휴대폰 브라우저에 자동 저장됩니다. 다른 휴대폰과 동기화하려면 나중에 Firestore 연결을 붙이면 됩니다.</p><button class="ghost" id="sampleBtn" type="button" style="width:100%;margin-top:10px">샘플 데이터 넣기</button><button class="danger" id="clearAllBtn" type="button" style="width:100%;margin-top:10px">전체 데이터 삭제</button></section>
  </main>
</div>

<nav class="bottom"><button class="nav active" data-screen="list"><span>👥</span>명단</button><button class="nav" data-screen="form"><span>＋</span>접수</button><button class="nav" data-screen="summary"><span>₩</span>정산</button><button class="nav" data-screen="settings"><span>⚙</span>설정</button></nav>
<div class="toast" id="toast"></div>
<div class="modal" id="confirmModal"><div class="sheet"><h3 id="modalTitle">확인</h3><p id="modalText">진행할까요?</p><div class="actions"><button class="ghost" id="modalCancel">취소</button><button class="danger" id="modalOk">확인</button></div></div></div>

<script>
'use strict';
const STORAGE_KEY='retreatRegistration2026.v2',SETTINGS_KEY='retreatRegistration2026.settings.v2';
const FEE={'성인':70000,'청년':70000,'은빛장년':50000,'대학생':40000,'취학아동(초등)':40000,'미취학아동(5~7)':30000},ORDER=Object.keys(FEE);
let people=[],settings={church:'광주봉선교회',zone:'17구역',defaultRound:'6차',vehicleUnitFee:20000},pending=null;
const $=id=>document.getElementById(id),won=n=>(Number(n)||0).toLocaleString('ko-KR')+'원',num=v=>Number(String(v||0).replace(/[^0-9]/g,''))||0,uid=()=>`p_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,8)}`;
const esc=v=>String(v??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));
const manwon=n=>Number(((Number(n)||0)/10000).toFixed(2));

function load(){
  try{people=JSON.parse(localStorage.getItem(STORAGE_KEY)||localStorage.getItem('retreatRegistration2026.v1')||'[]')}catch{people=[]}
  try{settings={...settings,...JSON.parse(localStorage.getItem(SETTINGS_KEY)||localStorage.getItem('retreatRegistration2026.settings.v1')||'{}')}}catch{}
  people=people.filter(p=>p.category!=='미취학아동(0~4)').map(p=>({...p,serviceDept:p.serviceDept==='찬양팀'?'찬양대':p.serviceDept,lodging:p.lodging==='신청 안함'?'총회제공':p.lodging}));
}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(people))}
function saveSettings(){localStorage.setItem(SETTINGS_KEY,JSON.stringify(settings))}
function toast(s){$('toast').textContent=s;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1700)}
function screen(name){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));$(`screen${name[0].toUpperCase()+name.slice(1)}`).classList.add('active');document.querySelectorAll('.nav').forEach(x=>x.classList.toggle('active',x.dataset.screen===name));if(name==='summary')renderSummary();if(name==='settings')fillSettings();scrollTo({top:0,behavior:'smooth'})}
function radio(name){return document.querySelector(`input[name="${name}"]:checked`)?.value||''}
function setRadio(name,value){document.querySelectorAll(`input[name="${name}"]`).forEach(x=>x.checked=x.value===value)}
function child(c){return c==='취학아동(초등)'||c==='미취학아동(5~7)'}
function updateServiceCustom(){const direct=$('serviceDept').value==='직접입력';$('serviceDeptCustomWrap').classList.toggle('hidden',!direct);if(!direct)$('serviceDeptCustom').value=''}
function getServiceDept(){return $('serviceDept').value==='직접입력' ? $('serviceDeptCustom').value.trim() : $('serviceDept').value}
function setServiceDept(value){const opts=[...$('serviceDept').options].map(o=>o.value);const v=value==='찬양팀'?'찬양대':(value||'');if(opts.includes(v)){$('serviceDept').value=v;$('serviceDeptCustom').value=''}else{$('serviceDept').value='직접입력';$('serviceDeptCustom').value=v}updateServiceCustom()}

function calc(){
  const c=$('category').value,base=FEE[c]||0,on=radio('vehicle')==='예',vc=on?num($('vehicleCount').value):0,vf=on?vc*num(settings.vehicleUnitFee):0,total=base+vf,mode=radio('payMode');
  $('vehicleCount').value=vc;
  if(mode==='완납')$('paidAmount').value=total;
  if(mode==='미납')$('paidAmount').value=0;
  const paid=Math.min(num($('paidAmount').value),total),unpaid=Math.max(total-paid,0);
  $('baseFeeText').textContent=won(base);$('vehicleFeeText').textContent=won(vf);$('totalFeeText').textContent=won(total);$('unpaidText').textContent=won(unpaid);
  $('vehicleCountWrap').classList.toggle('hidden',!on);$('childInfo').classList.toggle('hidden',!child(c));$('adultInfo').classList.toggle('hidden',child(c));
  $('gradeAgeLabel').textContent=c==='취학아동(초등)'?'학년':'나이';$('gradeAge').placeholder=c==='취학아동(초등)'?'예: 초1, 초2':'예: 5세, 6세';
  return{base,vf,total,paid,unpaid,vc};
}
function formData(){const a=calc(),category=$('category').value;return{id:$('editId').value||uid(),zone:$('zone').value.trim()||settings.zone,name:$('name').value.trim(),isNew:radio('isNew'),relation:$('relation').value,round:$('round').value,category,gender:radio('gender'),gradeAge:$('gradeAge').value.trim(),guardian:(child(category)?$('guardian'):$('guardianAdult')).value.trim(),phone:$('phone').value.trim(),serviceDept:getServiceDept(),vehicle:radio('vehicle'),vehicleCount:a.vc,lodging:radio('lodging'),baseFee:a.base,vehicleFee:a.vf,totalFee:a.total,paidAmount:a.paid,unpaidAmount:a.unpaid,memo:$('memo').value.trim(),updatedAt:new Date().toISOString(),createdAt:$('editId').value?people.find(x=>x.id===$('editId').value)?.createdAt||new Date().toISOString():new Date().toISOString()}}
function reset(){ $('personForm').reset();$('editId').value='';$('zone').value=settings.zone;$('round').value=settings.defaultRound;$('vehicleCount').value=0;$('paidAmount').value=0;$('formHeading').textContent='새 참가자 등록';$('deletePersonBtn').style.display='none';setRadio('isNew','아니오');setRadio('gender','남');setRadio('vehicle','아니오');setRadio('lodging','총회제공');setRadio('payMode','미납');setServiceDept('');calc() }
function fill(p){$('editId').value=p.id;$('zone').value=p.zone;$('name').value=p.name;$('relation').value=p.relation||'본인';$('round').value=p.round||settings.defaultRound;$('category').value=p.category;$('gradeAge').value=p.gradeAge||'';$('guardian').value=p.guardian||'';$('guardianAdult').value=p.guardian||'';$('phone').value=p.phone||'';setServiceDept(p.serviceDept||'');$('vehicleCount').value=p.vehicleCount||0;$('paidAmount').value=p.paidAmount||0;$('memo').value=p.memo||'';setRadio('isNew',p.isNew||'아니오');setRadio('gender',p.gender||'남');setRadio('vehicle',p.vehicle||'아니오');setRadio('lodging',p.lodging==='신청 안함'?'총회제공':p.lodging||'총회제공');setRadio('payMode',p.unpaidAmount===0&&p.totalFee>0?'완납':p.paidAmount?'부분':'미납');$('formHeading').textContent='참가자 수정';$('deletePersonBtn').style.display='block';calc();screen('form')}
function totals(list=people){return list.reduce((a,p)=>{a.count++;a.total+=p.totalFee||0;a.base+=p.baseFee||0;a.vehicle+=p.vehicleFee||0;a.paid+=p.paidAmount||0;a.unpaid+=p.unpaidAmount||0;a.vehiclePeople+=p.vehicle==='예'?(Number(p.vehicleCount)||1):0;return a},{count:0,total:0,base:0,vehicle:0,paid:0,unpaid:0,vehiclePeople:0})}
function avatar(p){return p.gender==='여'?'f':child(p.category)?'c':p.category==='은빛장년'?'s':''}
function tags(p){return`${p.vehicle==='예'?'<span class="tag">차량</span>':''}${p.lodging&&p.lodging!=='총회제공'&&p.lodging!=='신청 안함'?'<span class="tag green">영유아숙소</span>':''}${p.isNew==='예'?'<span class="tag yellow">새신자</span>':''}`}
function renderList(){ $('churchBadge').textContent=`${settings.church} · ${settings.zone}`;const q=$('searchInput').value.trim().toLowerCase(),f=$('filterCategory').value,list=people.filter(p=>(!q||`${p.name} ${p.phone} ${p.guardian} ${p.zone}`.toLowerCase().includes(q))&&(f==='all'||f==='unpaid'&&p.unpaidAmount>0||p.category===f)),s=totals();$('statCount').textContent=`${s.count}명`;$('statTotal').textContent=won(s.total);$('statUnpaid').textContent=won(s.unpaid);$('listCount').textContent=`${list.length}명`;$('personList').innerHTML=list.length?list.map(p=>`<article class="person" data-id="${p.id}"><div class="avatar ${avatar(p)}">${esc(p.name.slice(0,1))}</div><div><div class="pname">${esc(p.name)}</div><div class="psub">${esc(p.category)} · ${esc(p.gradeAge||p.relation||'-')} · ${esc(p.gender)} · ${esc(p.round)}</div><div class="tags">${tags(p)}</div></div><div class="amount"><b>${won(p.totalFee)}</b><small class="${p.unpaidAmount===0?'done':'red'}">${p.unpaidAmount===0?'납부완료':'미납 '+won(p.unpaidAmount)}</small></div><div class="chev">›</div></article>`).join(''):'<div class="empty">아직 등록된 참가자가 없어.<br>위의 파란 버튼으로 한 명씩 등록하면 돼.</div>';document.querySelectorAll('.person').forEach(x=>x.onclick=()=>fill(people.find(p=>p.id===x.dataset.id))) }
function categories(){return ORDER.map(cat=>{const a=people.filter(p=>p.category===cat);return{cat,count:a.length,total:a.reduce((s,p)=>s+(p.baseFee||0),0)}})}
function renderSummary(){const s=totals();$('moneySummaryBody').innerHTML=`<tr><th>전체 인원</th><td>${s.count}명</td></tr><tr><th>수양회비 총 합계액</th><td>${won(s.base)}</td></tr><tr><th>차량합계액</th><td>${won(s.vehicle)}</td></tr><tr><th>전체 총액</th><td>${won(s.total)}</td></tr><tr><th>총수령액</th><td>${won(s.paid)}</td></tr><tr><th>미납금액</th><td class="red">${won(s.unpaid)}</td></tr>`;$('categorySummaryBody').innerHTML=categories().map(x=>`<tr><td>${x.cat}</td><td>${x.count}명</td><td>${won(x.total)}</td></tr>`).join('')}

function borderStyle(){return{top:{style:'thin',color:{argb:'FF222222'}},left:{style:'thin',color:{argb:'FF222222'}},bottom:{style:'thin',color:{argb:'FF222222'}},right:{style:'thin',color:{argb:'FF222222'}}}}
function paint(cell,kind='base'){
  cell.font={name:'맑은 고딕',size:kind==='title'?15:kind==='header'?7:8,bold:kind==='title'||kind==='header'||kind==='total',color:{argb:'FF111111'}};
  cell.alignment={horizontal:'center',vertical:'middle',wrapText:true};
  cell.border=borderStyle();
  if(kind==='header')cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF2F2F2'}};
  if(kind==='total')cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF7F7F7'}};
}
function merge(ws,r1,c1,r2,c2){ws.mergeCells(r1,c1,r2,c2)}
function setv(ws,r,c,v){ws.getCell(r,c).value=v}
function mark(ok){return ok?'○':''}
function putSummaryNumber(cell,value){cell.value=manwon(value);cell.numFmt='#,##0.##'}

async function buildRegistrationWorkbook(){
  const wb=new ExcelJS.Workbook();
  wb.creator='2026 하계수양회 접수앱';
  wb.created=new Date();
  const ws=wb.addWorksheet('사전접수',{views:[{showGridLines:false}],pageSetup:{paperSize:9,orientation:'landscape',fitToPage:true,fitToWidth:1,fitToHeight:1,margins:{left:.16,right:.16,top:.22,bottom:.22,header:0,footer:0}}});
  const R_TITLE=1,R_ZONE=2,R_PRICE=3,R_GROUP=4,R_SUB=5,R_DATA=6,ROW_COUNT=Math.max(20,people.length),R_LAST=R_DATA+ROW_COUNT-1,R_SUM1=R_LAST+1,R_SUM2=R_LAST+2,R_SUM3=R_LAST+3,R_SUM4=R_LAST+4,LAST_COL=25;
  ws.columns=[5,10,5.5,7,5,4.2,4.2,4.2,4.2,4.6,4.6,4.6,4.6,4.2,4.2,5.5,4.5,5.5,12,13,8,8,7,7,7].map(w=>({width:w}));
  for(let r=1;r<=R_SUM4;r++)for(let c=1;c<=LAST_COL;c++){setv(ws,r,c,'');paint(ws.getCell(r,c),'base')}
  setv(ws,R_TITLE,1,`2026 하계수양회 ${settings.church} 사전접수`);merge(ws,R_TITLE,1,R_TITLE,LAST_COL);
  setv(ws,R_ZONE,1,`${settings.zone} 구역`);merge(ws,R_ZONE,1,R_ZONE,5);
  for(let c=1;c<=LAST_COL;c++){paint(ws.getCell(R_TITLE,c),'title');paint(ws.getCell(R_ZONE,c),'base')}

  [['번호',1],['이름',2],['새신자',3],['관계',4],['참석\n차수',5],['보호자\n/동반자\n/인도자',19],['연락처',20],['봉사\n부서',21],['차량\n접수\n(1인당 2만원)',22]].forEach(([v,c])=>{setv(ws,R_PRICE,c,v);merge(ws,R_PRICE,c,R_SUB,c)});
  const groups=[['₩70,000','성인',6,7],['₩70,000','청년',8,9],['₩50,000','은빛장년',10,11],['₩40,000','대학생',12,13],['₩40,000','취학아동(초등)',14,16],['₩30,000','미취학\n(유치부)\n(5~7세)',17,18]];
  groups.forEach(([fee,label,c1,c2])=>{setv(ws,R_PRICE,c1,fee);merge(ws,R_PRICE,c1,R_PRICE,c2);setv(ws,R_GROUP,c1,label);merge(ws,R_GROUP,c1,R_GROUP,c2)});
  [['남',6],['여',7],['남',8],['여',9],['남',10],['여',11],['남',12],['여',13],['남',14],['여',15],['학년',16],['○',17],['나이',18]].forEach(([v,c])=>setv(ws,R_SUB,c,v));
  setv(ws,R_PRICE,23,'숙소신청');merge(ws,R_PRICE,23,R_PRICE,25);
  setv(ws,R_GROUP,23,'총회제공');merge(ws,R_GROUP,23,R_SUB,23);
  setv(ws,R_GROUP,24,'영유아숙소\n(1~4세 무료)');merge(ws,R_GROUP,24,R_GROUP,25);
  setv(ws,R_SUB,24,'12개월이하');setv(ws,R_SUB,25,'2~4세');
  for(let r=R_PRICE;r<=R_SUB;r++)for(let c=1;c<=LAST_COL;c++)paint(ws.getCell(r,c),'header');

  people.forEach((p,i)=>{
    const r=R_DATA+i,lodging=p.lodging==='신청 안함'?'총회제공':p.lodging;
    setv(ws,r,1,i+1);setv(ws,r,2,p.name);setv(ws,r,3,mark(p.isNew==='예'));setv(ws,r,4,p.relation);setv(ws,r,5,p.round);
    setv(ws,r,6,mark(p.category==='성인'&&p.gender==='남'));setv(ws,r,7,mark(p.category==='성인'&&p.gender==='여'));
    setv(ws,r,8,mark(p.category==='청년'&&p.gender==='남'));setv(ws,r,9,mark(p.category==='청년'&&p.gender==='여'));
    setv(ws,r,10,mark(p.category==='은빛장년'&&p.gender==='남'));setv(ws,r,11,mark(p.category==='은빛장년'&&p.gender==='여'));
    setv(ws,r,12,mark(p.category==='대학생'&&p.gender==='남'));setv(ws,r,13,mark(p.category==='대학생'&&p.gender==='여'));
    setv(ws,r,14,mark(p.category==='취학아동(초등)'&&p.gender==='남'));setv(ws,r,15,mark(p.category==='취학아동(초등)'&&p.gender==='여'));setv(ws,r,16,p.category==='취학아동(초등)'?p.gradeAge:'');
    setv(ws,r,17,mark(p.category==='미취학아동(5~7)'));setv(ws,r,18,p.category==='미취학아동(5~7)'?p.gradeAge:'');
    setv(ws,r,19,p.guardian);setv(ws,r,20,p.phone);setv(ws,r,21,p.serviceDept);setv(ws,r,22,p.vehicle==='예'?(Number(p.vehicleCount)||1):'');
    setv(ws,r,23,mark(lodging==='총회제공'));setv(ws,r,24,mark(lodging==='12개월 이하'));setv(ws,r,25,mark(lodging==='2~4세'));
  });

  const cat=categories(),stats=totals(),summaryGroups=[[6,7],[8,9],[10,11],[12,13],[14,16],[17,18]];
  setv(ws,R_SUM1,1,'항목별인원(명)');merge(ws,R_SUM1,1,R_SUM1,5);
  setv(ws,R_SUM2,1,'항목별총액(만원)');merge(ws,R_SUM2,1,R_SUM2,5);
  cat.forEach((x,i)=>{const [c1,c2]=summaryGroups[i];setv(ws,R_SUM1,c1,x.count);merge(ws,R_SUM1,c1,R_SUM1,c2);putSummaryNumber(ws.getCell(R_SUM2,c1),x.total);merge(ws,R_SUM2,c1,R_SUM2,c2)});
  setv(ws,R_SUM3,1,'전체 인원(명)');merge(ws,R_SUM3,1,R_SUM3,5);setv(ws,R_SUM3,6,stats.count);merge(ws,R_SUM3,6,R_SUM3,9);setv(ws,R_SUM3,10,'전체 총액(만원)');merge(ws,R_SUM3,10,R_SUM3,15);putSummaryNumber(ws.getCell(R_SUM3,16),stats.total);merge(ws,R_SUM3,16,R_SUM3,18);
  setv(ws,R_SUM1,21,'합계');setv(ws,R_SUM1,22,stats.vehiclePeople);
  [['수양회비 총 합계액(만원)',stats.base],['차량합계액(만원)',stats.vehicle],['총수령액(만원)',stats.paid],['미납금액(만원)',stats.unpaid]].forEach(([label,value],i)=>{const r=R_SUM1+i;setv(ws,r,23,label);merge(ws,r,23,r,24);putSummaryNumber(ws.getCell(r,25),value)});
  for(let r=R_SUM1;r<=R_SUM4;r++)for(let c=1;c<=LAST_COL;c++)paint(ws.getCell(r,c),'total');

  ws.eachRow((row,rowNumber)=>{row.height=rowNumber===R_TITLE?27:rowNumber===R_ZONE?18:(rowNumber>=R_DATA&&rowNumber<=R_LAST?18:20)});
  return wb;
}

async function exportExcel(){
  if(!people.length)return toast('출력할 참가자가 없어');
  if(!window.ExcelJS)return toast('엑셀 모듈을 불러오지 못했어. 인터넷 연결을 확인해줘');
  try{
    toast('엑셀 파일 만드는 중...');
    const wb=await buildRegistrationWorkbook();
    const buffer=await wb.xlsx.writeBuffer();
    const blob=new Blob([buffer],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`2026_하계수양회_${settings.zone}_사전접수.xlsx`;
    document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1000);
    toast('엑셀 파일을 만들었어');
  }catch(e){console.error(e);toast('엑셀 출력 중 오류가 났어')}
}

function fillSettings(){$('setChurch').value=settings.church;$('setZone').value=settings.zone;$('setRound').value=settings.defaultRound;$('setVehicleFee').value=settings.vehicleUnitFee}
function confirm(title,text,fn){$('modalTitle').textContent=title;$('modalText').textContent=text;pending=fn;$('confirmModal').classList.add('show')}
function close(){pending=null;$('confirmModal').classList.remove('show')}
function samples(){[{name:'강지승',category:'성인',gender:'남',relation:'본인',paidAmount:90000,vehicle:'예',vehicleCount:1,lodging:'총회제공',serviceDept:'찬양대'},{name:'이가영',category:'성인',gender:'여',relation:'배우자',paidAmount:70000,vehicle:'아니오',vehicleCount:0,lodging:'총회제공',serviceDept:''},{name:'강은우',category:'취학아동(초등)',gender:'남',relation:'자녀',gradeAge:'초1',guardian:'강지승',paidAmount:0,vehicle:'예',vehicleCount:1,lodging:'총회제공',serviceDept:''},{name:'강선우',category:'미취학아동(5~7)',gender:'남',relation:'자녀',gradeAge:'4세',guardian:'강지승',paidAmount:0,vehicle:'아니오',vehicleCount:0,lodging:'2~4세',serviceDept:'직접봉사'}].forEach(x=>{const base=FEE[x.category],vf=x.vehicle==='예'?x.vehicleCount*settings.vehicleUnitFee:0,total=base+vf;people.push({id:uid(),zone:settings.zone,isNew:'아니오',round:settings.defaultRound,phone:'',memo:'',guardian:'',...x,baseFee:base,vehicleFee:vf,totalFee:total,unpaidAmount:Math.max(total-x.paidAmount,0),createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()})});save();renderList();renderSummary();toast('샘플 데이터를 넣었어')}
function bind(){
  $('exportExcelBtn').onclick=exportExcel;$('exportExcelBtn2').onclick=exportExcel;$('newPersonBtn').onclick=()=>{reset();screen('form')};$('backToListBtn').onclick=()=>screen('list');document.querySelectorAll('.nav').forEach(b=>b.onclick=()=>{if(b.dataset.screen==='form')reset();screen(b.dataset.screen)});
  ['category','vehicleCount','paidAmount'].forEach(id=>$(id).oninput=calc);document.querySelectorAll('input[name="vehicle"],input[name="payMode"]').forEach(x=>x.onchange=calc);$('serviceDept').onchange=updateServiceCustom;
  $('minusVehicle').onclick=()=>{$('vehicleCount').value=Math.max(0,num($('vehicleCount').value)-1);calc()};$('plusVehicle').onclick=()=>{$('vehicleCount').value=num($('vehicleCount').value)+1;setRadio('vehicle','예');calc()};
  $('personForm').onsubmit=e=>{e.preventDefault();const p=formData();if(!p.name)return toast('이름을 입력해줘');if(!p.category)return toast('대상 구분을 선택해줘');if(child(p.category)&&!p.gradeAge)return toast(p.category==='취학아동(초등)'?'학년을 입력해줘':'나이를 입력해줘');if($('serviceDept').value==='직접입력'&&!p.serviceDept)return toast('봉사 부서를 직접 입력해줘');if(p.paidAmount>p.totalFee)return toast('수령액이 총액보다 클 수 없어');const i=people.findIndex(x=>x.id===p.id);if(i<0){people.push(p);toast('저장 완료')}else{people[i]=p;toast('수정 완료')}save();renderList();renderSummary();reset();screen('list')};
  $('resetFormBtn').onclick=reset;$('deletePersonBtn').onclick=()=>{const p=people.find(x=>x.id===$('editId').value);if(p)confirm('참가자 삭제',`${p.name} 님을 삭제할까?`,()=>{people=people.filter(x=>x.id!==p.id);save();renderList();reset();screen('list');close();toast('삭제했어')})};
  $('searchInput').oninput=renderList;$('filterCategory').onchange=renderList;$('saveSettingsBtn').onclick=()=>{settings.church=$('setChurch').value.trim()||'광주봉선교회';settings.zone=$('setZone').value.trim()||'17구역';settings.defaultRound=$('setRound').value;settings.vehicleUnitFee=num($('setVehicleFee').value)||20000;saveSettings();reset();renderList();toast('설정을 저장했어')};
  $('sampleBtn').onclick=samples;$('clearAllBtn').onclick=()=>confirm('전체 삭제','등록된 모든 참가자 데이터를 삭제할까? 이 작업은 되돌릴 수 없어.',()=>{people=[];save();renderList();renderSummary();close();toast('전체 삭제 완료')});$('modalCancel').onclick=close;$('modalOk').onclick=()=>pending?.();$('confirmModal').onclick=e=>{if(e.target===$('confirmModal'))close()}
}
document.addEventListener('DOMContentLoaded',()=>{load();bind();reset();renderList();renderSummary()});
</script>
