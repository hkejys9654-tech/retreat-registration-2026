    :root{--blue:#1769e9;--green:#12a96b;--red:#ef4444;--ink:#0f172a;--muted:#64748b;--line:#e5eaf2;--bg:#f6f8fc;--card:#fff;--radius:18px}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif}button,input,select,textarea{font:inherit}button{border:0;cursor:pointer}.app{max-width:520px;min-height:100vh;margin:auto;padding:22px 16px 92px;background:linear-gradient(#fff,#f4f7fc)}.topbar,.head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.title h1{font-size:25px;line-height:1.12;margin:0 0 8px;font-weight:900}.badge,.pill,.tag{display:inline-flex;align-items:center;border-radius:999px;font-weight:800}.badge{padding:7px 10px;background:#eef6ff;color:var(--blue);font-size:13px}.excel{padding:10px 11px;border:1px solid #98d8b7;border-radius:12px;background:#f2fff8;color:#087443;font-size:13px;font-weight:900;white-space:nowrap}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}.stat,.card,.person{background:#fff;border:1px solid var(--line);box-shadow:0 7px 18px #0f172a0d}.stat{min-height:98px;padding:13px 10px;border-radius:16px}.stat span{display:grid;place-items:center;width:30px;height:30px;margin-bottom:8px;border-radius:12px;background:#eaf3ff;color:var(--blue);font-weight:900}.stat small{display:block;color:var(--muted);font-weight:700;font-size:12px}.stat b{font-size:20px}.red{color:var(--red)}.primary,.save{width:100%;height:54px;border-radius:15px;background:linear-gradient(#2378ff,#0960df);color:#fff;font-size:18px;font-weight:900;box-shadow:0 12px 24px #1769e940}.head{align-items:center;margin:22px 0 10px}.head h2{font-size:17px;margin:0}.pill{padding:5px 9px;color:var(--blue);background:#eaf3ff;font-size:13px}.tools{display:flex;gap:8px;margin-bottom:10px}.search{position:relative;flex:1}.search i{position:absolute;top:10px;left:12px;color:var(- <body>
<div class="app">
  <header class="topbar"><div class="title"><h1>2026 하계수양회 접수</h1><span class="badge" id="churchBadge">광주봉선교회 · 17구역</span></div><button class="excel" id="exportExcelBtn">▣ 엑셀 출력</button></header>

n"></div></div><div class="field" id="adultInfo"><label>보호자/동반자/인도자</label><input id="guardianAdult" placeholder="필요 시 입력"></div><div class="grid2"><div class="field"><label>연락처</label><input id="phone" type="tel" placeholder="010-0000-0000"></div><div class="field"><label>봉사 부서</label><select id="serviceDept"><option value="">선택 안함</option><option>찬양대</option><option>유치부</option><option>초등부</option><option>중고등부</option><option>식당봉사</option><option>차량봉사</option><option>방송/음향</option><option>기타</option><option value="__custom">직접입력</option></select></div></div><div class="field hidden" id="serviceDeptCustomWrap"><label>봉사 부서 직접입력</label><input id="serviceDeptCustom" placeholder="부서명을 직접 입력하세요"></div><div class="line"></div><div class="grid2"><div class="field"><label>차량 접수 <small style="color:var(--muted);font-weight:700">(1인당 2만원)</small></label><div class="seg"><input name="vehicle" id="vehicleYes" value="예" type="radio"><label for="vehicleYes">신청</label><input name="vehicle" id="vehicleNo" value="아니오" type="radio" checked><label for="vehicleNo">미신청</label></div></div><div class="field" id="vehicleCountWrap"><label>차량 인원</label><div class="counter"><button type="button" id="minusVehicle">−</button><input id="vehicleCount" type="number" min="0" value="0"><button type="button" id="plusVehicle">＋</button></div></div></div><div class="field"><label>숙소 신청</label><select id="lodging"><option value="신청 안함">신청 안함</option><option value="총회제공">총회제공</option><option value="12개월 이하">영유아숙소 · 12개월 이하</option><option value="2~4세">영유아숙소 · 2~4세</option></select></div><div class="line"></div><div class="grid2"><div class="field"><label>수령액</label><input id="paidAmount" type="number" min="0" value="0"></div><div class="field"><label>납부 상태</label><div class="seg three"><input name="payMode" id="payNone" value="미납" type="radio" checked><label for="payNone">미납</label><input name="payMode" id="payFull" value="완납" type="radio"><label for="payFull">완납</label><input name="payMode" id="payPart" value="부분" type="radio"><label for="payPart">부분</label></div></div></div><div class="calc"><div><small>회비</small><b id="baseFeeText">0원</b></div><b class="op">＋</b><div><small>차량금액</small><b id="vehicleFeeText">0원</b></div><b class="op">＝</b><div><small>총액 / 미납</small><b><em class="total" id="totalFeeText">0원</em> / <em class="red" id="unpaidText">0원</em></b></div></div><div class="field"><label>메모</label><textarea id="memo" placeholder="기타 메모를 입력하세요"></textarea></div><div class="actions"><button class="ghost" id="resetFormBtn" type="button">초기화</button><button class="save" type="submit">저장</button></div></form></section></main>
  <main class="screen" id="screenSummary"><section class="card summary"><h3>정산 요약</h3><table><tbody id="moneySummaryBody"></tbody></table></section><section class="card summary"><h3>항목별 인원/금액</h3><table><thead><tr><th>구분</th><th>인원</th><th>금액</th></tr></thead><tbody id="categorySummaryBody"></tbody></table></section><button class="primary" id="exportExcelBtn2">▣ 원본 양식대로 엑셀 출력</button></main>
  <main class="screen" id="screenSettings"><section class="card summary"><h3>기본 설정</h3><div class="grid2"><div class="field"><label>교회명</label><input id="setChurch"></div><div class="field"><label>기본 구역</label><input id="setZone"></div></div><div class="grid2"><div class="field"><label>기본 차수</label><select id="setRound"><option>1차</option><option>2차</option><option>3차</option><option>4차</option><option>5차</option><option>6차</option></select></div><div class="field"><label>차량 단가</label><input id="setVehicleFee" type="number" min="0"></div></div><button class="save" id="saveSettingsBtn" type="button">설정 저장</button></section><section class="card"><h3>데이터 관리</h3><p class="note">데이터는 이 휴대폰 브라우저에 자동 저장됩니다. 다른 휴대폰과 동기화하려면 나중에 Firestore 연결을 붙이면 됩니다.</p><button class="ghost" id="sampleBtn" type="button" style="width:100%;margin-top:10px">샘플 데이터 넣기</button><button class="danger" id="clearAllBtn" type="button" style="width:100%;margin-top:10px">전체 데이터 삭제</button></section></main>

<nav class="bottom"><button class="nav active" data-screen="list"><span>👥</span>명단</button><button class="nav" data-screen="form"><span>＋</span>접수</button><button class="nav" data-screen="summary"><span>₩</span>정산</button><button class="nav" data-screen="settings"><span>⚙</span>설정</button></nav><div class="toast" id="toast"></div><div class="modal" id="confirmModal"><div class="sheet"><h3 id="modalTitle">확인</h3><p id="modalText">진행할까요?</p><div class="actions"><button class="ghost" id="modalCancel">취소</button><button class="danger" id="modalOk">확인</button></div></div></div>
<script>
'use strict';
const STORAGE_KEY='retreatRegistration2026.v2',SETTINGS_KEY='retreatRegistration2026.settings.v2';
const FEE={'성인':70000,'청년':70000,'은빛장년':50000,'대학생':50000,'취학아동(초등)':40000,'미취학(유치부)(5~7세)':30000,'영유아(0~4)':0};
const PAID_ORDER=['성인','청년','은빛장년','대학생','취학아동(초등)','미취학(유치부)(5~7세)'];
const ALL_ORDER=[...PAID_ORDER,'영유아(0~4)'];
const DEPTS=['찬양대','유치부','초등부','중고등부','식당봉사','차량봉사','방송/음향','기타'];
let people=[],settings={church:'광주봉선교회',zone:'17구역',defaultRound:'6차',vehicleUnitFee:20000},pending=null;
const $=id=>document.getElementById(id),won=n=>(Number(n)||0).toLocaleString('ko-KR')+'원',num=v=>Number(String(v||0).replace(/[^0-9]/g,''))||0,uid=()=>`p_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,8)}`;
const esc=v=>String(v??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));
function load(){try{people=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}catch{people=[]}try{settings={...settings,...JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}')}}catch{}}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(people))}function saveSettings(){localStorage.setItem(SETTINGS_KEY,JSON.stringify(settings))}
function toast(s){$('toast').textContent=s;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1700)}
function screen(name){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));$(`screen${name[0].toUpperCase()+name.slice(1)}`).classList.add('active');document.querySelectorAll('.nav').forEach(x=>x.classList.toggle('active',x.dataset.screen===name));if(name==='summary')renderSummary();if(name==='settings')fillSettings();scrollTo({top:0,behavior:'smooth'})}
function radio(name){return document.querySelector(`input[name="${name}"]:checked`)?.value||''}function setRadio(name,value){document.querySelectorAll(`input[name="${name}"]`).forEach(x=>x.checked=x.value===value)}
function child(c){return c==='취학아동(초등)'||c==='미취학(유치부)(5~7세)'||c==='영유아(0~4)'}
function deptValue(){return $('serviceDept').value==='__custom'?$('serviceDeptCustom').value.trim():$('serviceDept').value}
function setDept(v){if(v&&!DEPTS.includes(v)){$('serviceDept').value='__custom';$('serviceDeptCustom').value=v;$('serviceDeptCustomWrap').classList.remove('hidden')}else{$('serviceDept').value=v||'';$('serviceDeptCustom').value='';$('serviceDeptCustomWrap').classList.add('hidden')}}
function calc(){const c=$('category').value,base=FEE[c]||0,on=radio('vehicle')==='예',vc=on?num($('vehicleCount').value):0,vf=on?Math.max(vc,1)*num(settings.vehicleUnitFee):0,total=base+vf,mode=radio('payMode');$('vehicleCount').value=vc;if(mode==='완납')$('paidAmount').value=total;if(mode==='미납')$('paidAmount').value=0;const paid=Math.min(num($('paidAmount').value),total),unpaid=Math.max(total-paid,0);$('baseFeeText').textContent=won(base);$('vehicleFeeText').textContent=won(vf);$('totalFeeText').textContent=won(total);$('unpaidText').textContent=won(unpaid);$('vehicleCountWrap').classList.toggle('hidden',!on);$('childInfo').classList.toggle('hidden',!child(c));$('adultInfo').classList.toggle('hidden',child(c));$('gradeAgeLabel').textContent=c==='취학아동(초등)'?'학년':'나이';$('gradeAge').placeholder=c==='취학아동(초등)'?'예: 초1, 초2':'예: 3세, 6세';return{base,vf,total,paid,unpaid,vc:Math.max(vc,on?1:0)}}
function formData(){const a=calc(),category=$('category').value;return{id:$('editId').value||uid(),zone:$('zone').value.trim()||settings.zone,name:$('name').value.trim(),isNew:radio('isNew'),relation:$('relation').value,round:$('round').value,category,gender:radio('gender'),gradeAge:$('gradeAge').value.trim(),guardian:(child(category)?$('guardian'):$('guardianAdult')).value.trim(),phone:$('phone').value.trim(),serviceDept:deptValue(),vehicle:radio('vehicle'),vehicleCount:a.vc,lodging:$('lodging').value,baseFee:a.base,vehicleFee:a.vf,totalFee:a.total,paidAmount:a.paid,unpaidAmount:a.unpaid,memo:$('memo').value.trim(),updatedAt:new Date().toISOString(),createdAt:$('editId').value?people.find(x=>x.id===$('editId').value)?.createdAt||new Date().toISOString():new Date().toISOString()}}
function reset(){$('personForm').reset();$('editId').value='';$('zone').value=settings.zone;$('round').value=settings.defaultRound;$('vehicleCount').value=0;$('paidAmount').value=0;$('lodging').value='신청 안함';setDept('');$('formHeading').textContent='새 참가자 등록';$('deletePersonBtn').style.display='none';setRadio('isNew','아니오');setRadio('gender','남');setRadio('vehicle','아니오');setRadio('payMode','미납');calc()}
function fill(p){$('editId').value=p.id;$('zone').value=p.zone;$('name').value=p.name;$('relation').value=p.relation||'본인';$('round').value=p.round||settings.defaultRound;$('category').value=p.category;$('gradeAge').value=p.gradeAge||'';$('guardian').value=p.guardian||'';$('guardianAdult').value=p.guardian||'';$('phone').value=p.phone||'';setDept(p.serviceDept||'');$('vehicleCount').value=p.vehicleCount||0;$('lodging').value=p.lodging||'신청 안함';$('paidAmount').value=p.paidAmount||0;$('memo').value=p.memo||'';setRadio('isNew',p.isNew||'아니오');setRadio('gender',p.gender||'남');setRadio('vehicle',p.vehicle||'아니오');setRadio('payMode',p.unpaidAmount===0&&p.totalFee>0?'완납':p.paidAmount?'부분':'미납');$('formHeading').textContent='참가자 수정';$('deletePersonBtn').style.display='block';calc();screen('form')}
function totals(list=people){return list.reduce((a,p)=>{a.count++;a.total+=p.totalFee||0;a.base+=p.baseFee||0;a.vehicle+=p.vehicleFee||0;a.paid+=p.paidAmount||0;a.unpaid+=p.unpaidAmount||0;return a},{count:0,total:0,base:0,vehicle:0,paid:0,unpaid:0})}
function avatar(p){return p.gender==='여'?'f':child(p.category)?'c':p.category==='은빛장년'?'s':''}function tags(p){return`${p.vehicle==='예'?'<span class="tag">차량</span>':''}${p.lodging&&p.lodging!=='신청 안함'?'<span class="tag green">숙소</span>':''}${p.isNew==='예'?'<span class="tag yellow">새신자</span>':''}`}
function renderList(){$('churchBadge').textContent=`${settings.church} · ${settings.zone}`;const q=$('searchInput').value.trim().toLowerCase(),f=$('filterCategory').value,list=people.filter(p=>(!q||`${p.name} ${p.phone} ${p.guardian} ${p.zone}`.toLowerCase().includes(q))&&(f==='all'||f==='unpaid'&&p.unpaidAmount>0||p.category===f)),s=totals();$('statCount').textContent=`${s.count}명`;$('statTotal').textContent=won(s.total);$('statUnpaid').textContent=won(s.unpaid);$('listCount').textContent=`${list.length}명`;$('personList').innerHTML=list.length?list.map(p=>`<article class="person" data-id="${p.id}"><div class="avatar ${avatar(p)}">${esc(p.name.slice(0,1))}</div><div><div class="pname">${esc(p.name)}</div><div class="psub">${esc(p.category)} · ${esc(p.gradeAge||p.relation||'-')} · ${esc(p.gender)} · ${esc(p.round)}</div><div class="tags">${tags(p)}</div></div><div class="amount"><b>${won(p.totalFee)}</b><small class="${p.unpaidAmount===0?'done':'red'}">${p.unpaidAmount===0?'납부완료':'미납 '+won(p.unpaidAmount)}</small></div><div class="chev">›</div></article>`).join(''):'<div class="empty">아직 등록된 참가자가 없어.<br>위의 파란 버튼으로 한 명씩 등록하면 돼.</div>';document.querySelectorAll('.person').forEach(x=>x.onclick=()=>fill(people.find(p=>p.id===x.dataset.id)))}
function categories(order=PAID_ORDER){return order.map(cat=>{const a=people.filter(p=>p.category===cat);return{cat,count:a.length,total:a.reduce((s,p)=>s+(p.baseFee||0),0)}})}
function renderSummary(){const s=totals();$('moneySummaryBody').innerHTML=`<tr><th>전체 인원</th><td>${s.count}명</td></tr><tr><th>수양회비 총 합계액</th><td>${won(s.base)}</td></tr><tr><th>차량합계액</th><td>${won(s.vehicle)}</td></tr><tr><th>전체 총액</th><td>${won(s.total)}</td></tr><tr><th>총수령액</th><td>${won(s.paid)}</td></tr><tr><th>미납금액</th><td class="red">${won(s.unpaid)}</td></tr>`;$('categorySummaryBody').innerHTML=categories(ALL_ORDER).map(x=>`<tr><td>${x.cat}</td><td>${x.count}명</td><td>${won(x.total)}</td></tr>`).join('')}
function buildRegistrationSheet(){
  const ws={};
  const rowTitle=0,rowZone=1,rowPrice=2,rowGroup=3,rowSub=4,rowData=5;
  const rowCount=Math.max(20,people.length),rowLast=rowData+rowCount-1;
  const rowSum=rowLast+1,rowCat1=rowSum+1,rowCat2=rowCat1+1,rowTot1=rowCat2+1,rowTot2=rowTot1+1,lastCol=24;
  const merges=[];
  const cell=(r,c,value)=>{const a=XLSX.utils.encode_cell({r,c}),t=ws[a]||(ws[a]={});if(value!==undefined){t.t=typeof value==='number'?'n':'s';t.v=value}else if(!('v' in t)){t.t='s';t.v=''}return t};
  const range=(r1,c1,r2,c2)=>`${XLSX.utils.encode_cell({r:r1,c:c1})}:${XLSX.utils.encode_cell({r:r2,c:c2})}`;
  const merge=(r1,c1,r2,c2)=>merges.push({s:{r:r1,c:c1},e:{r:r2,c:c2}});
  const line={style:'thin',color:{rgb:'222222'}},border={top:line,bottom:line,left:line,right:line};
  const base={font:{name:'맑은 고딕',sz:8,color:{rgb:'111111'}},alignment:{horizontal:'center',vertical:'center',wrapText:true},border};
  const header={...base,font:{name:'맑은 고딕',sz:7,bold:true,color:{rgb:'111111'}},fill:{fgColor:{rgb:'F2F2F2'}}};
  const title={...base,font:{name:'맑은 고딕',sz:15,bold:true,color:{rgb:'111111'}}};
  const zoneSt={...base,font:{name:'맑은 고딕',sz:10,bold:true,color:{rgb:'111111'}}};
  const totalStyle={...base,font:{name:'맑은 고딕',sz:8,bold:true,color:{rgb:'111111'}},fill:{fgColor:{rgb:'F7F7F7'}}};
  for(let r=rowPrice;r<=rowTot2;r++)for(let c=0;c<=lastCol;c++)cell(r,c);
  cell(rowTitle,0,`2026 하계수양회 ${settings.church} 사전접수`);merge(rowTitle,0,rowTitle,lastCol);
  cell(rowZone,0,`( ${settings.zone} ) 구역`);merge(rowZone,0,rowZone,5);
  [['번호',0],['이름',1],['새신자',2],['관계',3],['참석\n차수',4]].forEach(([v,c])=>{cell(rowPrice,c,v);merge(rowPrice,c,rowSub,c)});
  [['₩70,000',5,8],['₩50,000',9,12],['₩40,000',13,15],['₩30,000',16,17]].forEach(([v,c1,c2])=>{cell(rowPrice,c1,v);merge(rowPrice,c1,rowPrice,c2)});
  [['성인',5,6],['청년',7,8],['은빛장년',9,10],['대학생',11,12],['취학아동(초등)',13,15]].forEach(([v,c1,c2])=>{cell(rowGroup,c1,v);merge(rowGroup,c1,rowGroup,c2)});
  cell(rowGroup,16,'미취학\n(유치부)\n(5~7세)');merge(rowGroup,16,rowSub,16);
  cell(rowGroup,17,'나이');merge(rowGroup,17,rowSub,17);
  [['남',5],['여',6],['남',7],['여',8],['남',9],['여',10],['남',11],['여',12],['남',13],['여',14],['학년',15]].forEach(([v,c])=>cell(rowSub,c,v));
  cell(rowPrice,18,'보호자\n/동반자\n/인도자');merge(rowPrice,18,rowSub,18);
  cell(rowPrice,19,'연락처');merge(rowPrice,19,rowSub,19);
  cell(rowPrice,20,'봉사\n부서');merge(rowPrice,20,rowSub,20);
  cell(rowPrice,21,'차량\n접수\n(1인당 2만원)');merge(rowPrice,21,rowSub,21);
  cell(rowPrice,22,'숙소신청');merge(rowPrice,22,rowPrice,24);
  cell(rowGroup,22,'총회\n제공');merge(rowGroup,22,rowSub,22);
  cell(rowGroup,23,'영유아숙소(1~4세 무료)');merge(rowGroup,23,rowGroup,24);
  cell(rowSub,23,'12개월이하');cell(rowSub,24,'2~4세');
  cell(rowTitle,0).s=title;cell(rowZone,0).s=zoneSt;
  for(let c=0;c<=lastCol;c++){if(c>0){cell(rowTitle,c).s=title;cell(rowZone,c).s=zoneSt}for(let r=rowPrice;r<=rowSub;r++)cell(r,c).s=header}
  for(let r=rowData;r<=rowLast;r++)for(let c=0;c<=lastCol;c++)cell(r,c).s=base;
  const mk=ok=>ok?'○':'';
  people.forEach((p,i)=>{const r=rowData+i;
    cell(r,0,i+1);cell(r,1,p.name);cell(r,2,mk(p.isNew==='예'));cell(r,3,p.relation);cell(r,4,p.round);
    cell(r,5,mk(p.category==='성인'&&p.gender==='남'));cell(r,6,mk(p.category==='성인'&&p.gender==='여'));
    cell(r,7,mk(p.category==='청년'&&p.gender==='남'));cell(r,8,mk(p.category==='청년'&&p.gender==='여'));
    cell(r,9,mk(p.category==='은빛장년'&&p.gender==='남'));cell(r,10,mk(p.category==='은빛장년'&&p.gender==='여'));
    cell(r,11,mk(p.category==='대학생'&&p.gender==='남'));cell(r,12,mk(p.category==='대학생'&&p.gender==='여'));
    cell(r,13,mk(p.category==='취학아동(초등)'&&p.gender==='남'));cell(r,14,mk(p.category==='취학아동(초등)'&&p.gender==='여'));
    cell(r,15,p.category==='취학아동(초등)'?p.gradeAge:'');
    cell(r,16,mk(p.category==='미취학(유치부)(5~7세)'));cell(r,17,(p.category==='미취학(유치부)(5~7세)'||p.category==='영유아(0~4)')?p.gradeAge:'');
    cell(r,18,p.guardian);cell(r,19,p.phone);cell(r,20,p.serviceDept);
    cell(r,21,mk(p.vehicle==='예'));
    cell(r,22,mk(p.lodging==='총회제공'));cell(r,23,mk(p.lodging==='12개월 이하'));cell(r,24,mk(p.lodging==='2~4세'));
  });
  for(let c=0;c<=lastCol;c++)cell(rowSum,c).s=totalStyle;
  cell(rowSum,18,'합계');merge(rowSum,18,rowSum,20);
  const vehSum=people.reduce((s,p)=>s+(p.vehicle==='예'?Math.max(p.vehicleCount||1,1):0),0);
  cell(rowSum,21,vehSum||'');
  cell(rowSum,22,people.filter(p=>p.lodging==='총회제공').length||'');
  cell(rowSum,23,people.filter(p=>p.lodging==='12개월 이하').length||'');
  cell(rowSum,24,people.filter(p=>p.lodging==='2~4세').length||'');
  const stats=totals(),cat=categories(),sg=[[5,6],[7,8],[9,10],[11,12],[13,15],[16,17]];
  cell(rowCat1,0,'항목별인원(명)');merge(rowCat1,0,rowCat1,4);
  cell(rowCat2,0,'항목별총액(만원)');merge(rowCat2,0,rowCat2,4);
  cat.forEach((x,i)=>{const[c1,c2]=sg[i];cell(rowCat1,c1,x.count||0);merge(rowCat1,c1,rowCat1,c2);cell(rowCat2,c1,Math.round((x.total||0)/10000));merge(rowCat2,c1,rowCat2,c2)});
  cell(rowCat1,18,'수양회비 총 합계액');merge(rowCat1,18,rowCat1,21);cell(rowCat1,22,stats.base||0);merge(rowCat1,22,rowCat1,24);
  cell(rowCat2,18,'차량합계액');merge(rowCat2,18,rowCat2,21);cell(rowCat2,22,stats.vehicle||0);merge(rowCat2,22,rowCat2,24);
  cell(rowTot1,0,'전체 인원(명)');merge(rowTot1,0,rowTot2,3);cell(rowTot1,4,stats.count||0);merge(rowTot1,4,rowTot2,8);
  cell(rowTot1,9,'전체 총액(만원)');merge(rowTot1,9,rowTot2,14);cell(rowTot1,15,Math.round((stats.total||0)/10000));merge(rowTot1,15,rowTot2,17);
  cell(rowTot1,18,'총수령액');merge(rowTot1,18,rowTot1,21);cell(rowTot1,22,stats.paid||0);merge(rowTot1,22,rowTot1,24);
  cell(rowTot2,18,'미납금액');merge(rowTot2,18,rowTot2,21);cell(rowTot2,22,stats.unpaid||0);merge(rowTot2,22,rowTot2,24);
  for(let r=rowSum;r<=rowTot2;r++)for(let c=0;c<=lastCol;c++){if(!cell(r,c).s)cell(r,c).s=totalStyle;if(typeof cell(r,c).v==='number')cell(r,c).z='#,##0'}
  ws['!ref']=range(rowTitle,0,rowTot2,lastCol);ws['!merges']=merges;
  ws['!cols']=[4.5,9,5,6,4.5,4,4,4,4,4.2,4.2,4,4,4,4,5,6,5,11,12,6,6.5,5,8,6].map(wch=>({wch}));
  ws['!rows']=[];for(let r=0;r<=rowTot2;r++){let hpt=18;if(r===rowTitle)hpt=28;else if(r===rowPrice)hpt=16;else if(r===rowGroup)hpt=24;else if(r===rowSub)hpt=16;ws['!rows'][r]={hpt}}
  ws['!margins']={left:.2,right:.2,top:.3,bottom:.3,header:0,footer:0};
  ws['!pageSetup']={orientation:'landscape',paperSize:9,fitToWidth:1,fitToHeight:1};

  return ws;
}
function exportExcel(){if(!people.length)return toast('출력할 참가자가 없어');const fileName=`2026_하계수양회_${settings.zone}_사전접수.xlsx`;if(window.XLSX){const wb=XLSX.utils.book_new(),ws=buildRegistrationSheet();XLSX.utils.book_append_sheet(wb,ws,'사전접수');XLSX.writeFile(wb,fileName);toast('원본 양식 엑셀 파일을 만들었어')}else{toast('엑셀 서식 모듈을 불러오지 못했어. 잠시 후 다시 시도해줘')}}
function fillSettings(){$('setChurch').value=settings.church;$('setZone').value=settings.zone;$('setRound').value=settings.defaultRound;$('setVehicleFee').value=settings.vehicleUnitFee}
function confirmDlg(title,text,fn){$('modalTitle').textContent=title;$('modalText').textContent=text;pending=fn;$('confirmModal').classList.add('show')}function closeDlg(){pending=null;$('confirmModal').classList.remove('show')}
function samples(){[{name:'강지승',category:'성인',gender:'남',relation:'본인',serviceDept:'찬양대',paidAmount:90000,vehicle:'예',vehicleCount:1,lodging:'신청 안함'},{name:'이가영',category:'성인',gender:'여',relation:'배우자',serviceDept:'식당봉사',paidAmount:70000,vehicle:'아니오',vehicleCount:0,lodging:'총회제공'},{name:'강은우',category:'취학아동(초등)',gender:'남',relation:'자녀',gradeAge:'초1',guardian:'강지승',paidAmount:0,vehicle:'예',vehicleCount:1,lodging:'신청 안함'},{name:'강선우',category:'미취학(유치부)(5~7세)',gender:'남',relation:'자녀',gradeAge:'6세',guardian:'강지승',paidAmount:0,vehicle:'아니오',vehicleCount:0,lodging:'2~4세'}].forEach(x=>{const b=FEE[x.category]||0,vf=x.vehicle==='예'?Math.max(x.vehicleCount,1)*settings.vehicleUnitFee:0,t=b+vf;people.push({id:uid(),zone:settings.zone,isNew:'아니오',round:settings.defaultRound,phone:'',serviceDept:'',memo:'',guardian:'',...x,baseFee:b,vehicleFee:vf,totalFee:t,unpaidAmount:Math.max(t-x.paidAmount,0),createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()})});save();renderList();renderSummary();toast('샘플 데이터를 넣었어')}
function bind(){$('exportExcelBtn').onclick=exportExcel;$('exportExcelBtn2').onclick=exportExcel;$('newPersonBtn').onclick=()=>{reset();screen('form')};$('backToListBtn').onclick=()=>screen('list');document.querySelectorAll('.nav').forEach(b=>b.onclick=()=>{if(b.dataset.screen==='form')reset();screen(b.dataset.screen)});['category','vehicleCount','paidAmount'].forEach(id=>$(id).oninput=calc);document.querySelectorAll('input[name="vehicle"],input[name="payMode"]').forEach(x=>x.onchange=calc);$('serviceDept').onchange=()=>$('serviceDeptCustomWrap').classList.toggle('hidden',$('serviceDept').value!=='__custom');$('minusVehicle').onclick=()=>{$('vehicleCount').value=Math.max(0,num($('vehicleCount').value)-1);calc()};$('plusVehicle').onclick=()=>{$('vehicleCount').value=num($('vehicleCount').value)+1;setRadio('vehicle','예');calc()};$('personForm').onsubmit=e=>{e.preventDefault();const p=formData();if(!p.name)return toast('이름을 입력해줘');if(!p.category)return toast('대상 구분을 선택해줘');if(child(p.category)&&!p.gradeAge)return toast(p.category==='취학아동(초등)'?'학년을 입력해줘':'나이를 입력해줘');if($('serviceDept').value==='__custom'&&!p.serviceDept)return toast('봉사 부서를 직접 입력해줘');if(p.paidAmount>p.totalFee)return toast('수령액이 총액보다 클 수 없어');const i=people.findIndex(x=>x.id===p.id);if(i<0){people.push(p);toast('저장 완료')}else{people[i]=p;toast('수정 완료')}save();renderList();renderSummary();reset();screen('list')};$('resetFormBtn').onclick=reset;$('deletePersonBtn').onclick=()=>{const p=people.find(x=>x.id===$('editId').value);if(p)confirmDlg('참가자 삭제',`${p.name} 님을 삭제할까?`,()=>{people=people.filter(x=>x.id!==p.id);save();renderList();reset();screen('list');closeDlg();toast('삭제했어')})};$('searchInput').oninput=renderList;$('filterCategory').onchange=renderList;$('saveSettingsBtn').onclick=()=>{settings.church=$('setChurch').value.trim()||'광주봉선교회';settings.zone=$('setZone').value.trim()||'17구역';settings.defaultRound=$('setRound').value;settings.vehicleUnitFee=num($('setVehicleFee').value)||20000;saveSettings();reset();renderList();toast('설정을 저장했어')};$('sampleBtn').onclick=samples;$('clearAllBtn').onclick=()=>confirmDlg('전체 삭제','등록된 모든 참가자 데이터를 삭제할까? 이 작업은 되돌릴 수 없어.',()=>{people=[];save();renderList();renderSummary();closeDlg();toast('전체 삭제 완료')});$('modalCancel').onclick=closeDlg;$('modalOk').onclick=()=>pending?.();$('confirmModal').onclick=e=>{if(e.target===$('confirmModal'))closeDlg()}}
document.addEventListener('DOMContentLoaded',()=>{load();bind();reset();renderList();renderSummary()});
</script>
